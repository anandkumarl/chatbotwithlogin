spring.application.name=rag-chatbot

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000ms

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:AIzaSyDbSz7B4GypD0kRKqDOdxq4swrv9JF9RSI}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.ragchatbot=DEBUG

# PostgreSQL Configuration
# spring.datasource.url=jdbc:postgresql://localhost:5432/ragchatbot
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Database Configuration (for development)
spring.datasource.url=jdbc:h2:mem:ragchatbot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JWT Configuration
jwt.secret=mySuperSecretKeyThatIsLongEnoughForHS256Algorithm
jwt.expiration=86400000
